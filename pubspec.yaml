name: romanticists_app
description: The 21st Romanticists — A literary blogging platform for poets and authors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^13.0.0

  # State management
  provider: ^6.1.0

  # UI & Content
  flutter_html: ^3.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  share_plus: ^7.2.0
  flutter_local_notifications: ^17.0.0
  package_info_plus: ^8.0.0
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  timeago: ^3.6.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FBF9F3"
  adaptive_icon_foreground: "assets/images/app_icon.png"
