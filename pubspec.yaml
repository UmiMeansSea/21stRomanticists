name: romanticists_app
description: The 21st Romanticists — A literary blogging platform for poets and authors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^13.0.0

  # State management
  provider: ^6.1.0

  # UI & Content
  flutter_html: ^3.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  share_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
